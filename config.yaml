# ─────────────────────────────────────────────────────────────────────────────
# Project-specific configuration for generate-plans.sh.
#
# Edit this file to adapt the pipeline to your project.
# For personal overrides, create config.local.yaml (gitignored).
# ─────────────────────────────────────────────────────────────────────────────

# Working directory for Claude sessions.
# Claude runs from this directory and can access all files within it.
# Set to a parent directory containing all repos Claude should access.
# If empty or missing, sessions run in a temporary directory (no file access).
# Override per-run: WORK_DIR=/path ./generate-plans.sh ...
work_dir: ""

# Additional directories Claude might need outside work_dir.
# Passed as --add-dir flags. Missing directories are silently skipped.
# Paths can be absolute or relative to the script directory ($SCRIPT_DIR).
add_dirs: []
  # - ../shared-libs
  # - ../../other-repo

# MCP server configuration file (JSON).
# Gives Claude access to external knowledge sources (internal docs, wikis, APIs).
# This reduces same-model blind spots by providing knowledge the model wasn't
# trained on. Path is relative to script directory or absolute.
mcp_config: ""

# MCP isolation policy.
# When true (default), adds --strict-mcp-config to only load servers from
# mcp_config above, ignoring user-level MCP servers (Scholar Gateway, etc.).
# When false, user MCP servers are available to all sessions.
# Override in config.local.yaml to whitelist your preferred MCP servers.
strict_mcp: true

# Tools whitelist for generation sessions (--allowedTools).
# Default: "Read,Glob,Bash,Write,WebFetch,WebSearch"
# Add MCP tool names to allow loaded MCP servers, e.g.:
#   allowed_tools: "Read,Glob,Bash,Write,WebFetch,WebSearch,mcp__claude_ai_Scholar_Gateway__semanticSearch"
allowed_tools: ""

# Settings sources for generation sessions (--setting-sources).
# Default: "project,local" (isolated from user settings).
# Set to "user,project,local" to load all user-level skills/plugins.
setting_sources: ""

# Session settings passed via --settings flag (JSON).
# Selectively enable plugins/skills without loading all user settings.
# This YAML dict is extracted as JSON at runtime and passed to claude.
# Example:
#   session_settings:
#     enabledPlugins:
#       context7@claude-plugins-official: true
#       superpowers@claude-plugins-official: true

# Prompt variants — each forces a different perspective on the same base prompt.
# "baseline" should always have an empty value (no extra guidance).
#
# Each variant can be a simple guidance string or a map with model + guidance:
#   simple:    variant_name: "guidance text"
#   extended:  variant_name:
#                model: sonnet          # override model for this variant
#                guidance: "guidance text"
# Per-variant models reduce same-model correlation (different models have
# different biases). If no model is specified, the global MODEL is used.
#
# Default: 4 variants recommended. Research shows diminishing returns beyond 4
# for same-model ensembles — diversity comes from prompt variation, not repetition.
# See research/number-of-llms-sessions.md for details.
#
# Customize these to match your domain. Good variant dimensions:
#   - simplicity vs. completeness
#   - code depth vs. architecture breadth
#   - operational detail vs. design patterns
variants:
  baseline: ""

  simplicity: |
    ## Additional guidance
    Prioritize simplicity — find the smallest possible scope that still
    addresses the core problem. Minimize moving parts. Question whether each
    element is truly needed.

  depth: |
    ## Additional guidance
    Go deep on specifics. Show detailed examples, exact steps, concrete
    patterns, and how components work together. Prefer specificity over
    generality.

  breadth: |
    ## Additional guidance
    Take a wide view. Consider alternative approaches, trade-offs, risks,
    and second-order effects. Map the full landscape before recommending
    a path.

# ─── Alternative lens strategies ──────────────────────────────────────────
# The default analytical lenses (baseline/simplicity/depth/breadth) are
# domain-agnostic. For better results, consider domain-specific alternatives.
# Uncomment and adapt a strategy below, or mix elements from several.
#
# PERSONA-BASED (who is thinking):
# Different personas attend to different aspects of the same problem.
# Research: diverse personas improved accuracy from 82% to 91% on reasoning
# benchmarks (Hegazy, 2024, arXiv:2410.12853).
#
#   architect:
#     guidance: "You are a senior systems architect. Prioritize scalability,
#       separation of concerns, and long-term maintainability."
#   pragmatist:
#     guidance: "You are a staff engineer who ships. Shortest path to
#       production. Cut scope aggressively. No speculative abstractions."
#   skeptic:
#     guidance: "You are a security-minded tech lead. Question every
#       assumption. What fails first? What's the blast radius?"
#   visionary:
#     guidance: "You are a research engineer. Explore unconventional
#       approaches the team wouldn't normally consider."
#
# CONSTRAINT-BASED (different operating conditions):
# Force plans into genuinely different solution spaces by varying constraints.
#
#   fast-and-cheap:
#     guidance: "Assume a 2-week deadline and $5K budget."
#   unlimited-time:
#     guidance: "Assume unlimited time but a team of 1."
#   scale-first:
#     guidance: "Assume this needs to serve 10x current load within 6 months."
#   legacy-compat:
#     guidance: "Assume zero breaking changes to existing interfaces."
#
# ADVERSARIAL (contrarian perspective):
# Counteracts Degeneration-of-Thought — same-model runs converging on the
# same answer. One contrarian variant can surface alternatives others miss.
#
#   contrarian:
#     guidance: |
#       Identify the most obvious approach to this task, then propose a
#       fundamentally different alternative. Your plan MUST differ
#       structurally from what a conventional approach would look like.
#
# COST-OPTIMIZED (model cascade):
# Use cheaper models for generation, reserve Opus for merge where quality
# matters most. ~48% cost savings vs. all-Opus. Research: Self-MoA (Li et
# al., 2025) shows quality of the aggregator matters more than proposers.
#
#   architect:
#     model: sonnet
#     guidance: "You are a senior systems architect..."
#   pragmatist:
#     model: sonnet
#     guidance: "You are a staff engineer who ships..."
#   skeptic:
#     model: sonnet
#     guidance: "You are a security-minded tech lead..."
#   visionary:
#     model: opus
#     guidance: "You are a research engineer..."
