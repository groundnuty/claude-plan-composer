name: Bug Report
description: Report a bug in Claude Plan Composer
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `cpc generate ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CPC Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "22.0.0"
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model Used
      placeholder: "claude-sonnet-4-6"
