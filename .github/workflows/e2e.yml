name: E2E Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: jetify-com/devbox-install-action@a03cbe14440d2f364ea862b1ba2e795637028b16 # v0.12.0

      - name: Run E2E tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: devbox run -- make -f dev.mk test-e2e
