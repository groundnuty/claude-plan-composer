# ─────────────────────────────────────────────────────────────────────────────
# Merge configuration — customize how plans are compared and merged.
#
# For personal overrides, create merge-config.local.yaml (gitignored).
# Or specify explicitly: MERGE_CONFIG=my-merge.yaml ./merge-plans.sh ...
# ─────────────────────────────────────────────────────────────────────────────

# Working directory for Claude merge sessions.
# If empty or missing, sessions run in a temporary directory (no file access).
# Override per-run: WORK_DIR=/path ./merge-plans.sh ...
work_dir: ""

# MCP server configuration file (JSON).
# Gives Claude access to external knowledge during merge (e.g., verify against docs).
mcp_config: ""

# Short description of what these plans are about.
# Used in the intro prompt to give Claude context.
project_description: "a software project (customize in merge-config.yaml)"

# Role the merge LLM assumes (simple mode only).
role: "an expert analyst"

# How to compare plans across dimensions.
# holistic (default): LLM evaluates all plans per dimension simultaneously
# pairwise: Compare plans 2 at a time, then tally results (more reliable for
#   4+ plans, avoids position bias, but slower). Simple mode only.
comparison_method: holistic

# Dimensions to compare across plans.
# Each dimension becomes a row in the comparison table and a debate topic.
# Simple form: string (equal weight). Extended form: {name, weight}.
# Weights are used in pairwise tournament scoring and synthesis instructions.
dimensions:
  - Approach and strategy
  - Scope and priorities
  - Technical depth and specificity
  - Architecture and structure
  - Risk assessment and trade-offs
  - Actionability and next steps
# Weighted example:
#   - name: "Approach and strategy"
#     weight: 0.3
#   - name: "Actionability and next steps"
#     weight: 0.3
#   - "Technical depth"   # weight defaults to equal share of remainder

# Instructions for each advocate agent (agent-teams mode).
# Describes how advocates should argue for their plan.
advocate_instructions: |
  Argue for its approach in each dimension. Challenge the other
  advocates' plans where yours is stronger. Concede where yours is weaker.
  Be specific — cite exact sections and trade-offs.

# What the merged output should achieve.
# This shapes the final synthesis goal.
output_goal: |
  The merged plan must be standalone — someone should be able to act on it
  without referencing the source plans.

# Title for the merged plan file.
output_title: "Merged Plan"

# Quality principles the merged plan must satisfy.
# After synthesis, the merge verifies each principle and revises if needed.
# Customize to match your project's quality standards.
constitution:
  - "Every trade-off must be explicitly acknowledged with pros and cons"
  - "No section should be purely aspirational — each needs a concrete next step"
  - "Risks identified in any source plan must appear in the merged plan"
  - "The plan must be self-consistent — no section contradicts another"
